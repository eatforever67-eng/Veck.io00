<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Automatic Disguise -->
    <title>Classes</title>
    <link rel="icon" type="image/png" href="https://gstatic.com">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }
        iframe {
            width: 100%; height: 100%; border: none; display: block;
        }
    </style>
</head>
<body>

    <!-- Direct Unblocked Roblox Mirror Stream -->
    <iframe src="https://now-gg.com" allow="pointer-lock; fullscreen;"></iframe>

    <script>
        // Automatic Back Button Trap
        window.onload = function() {
            for (let i = 0; i < 10; i++) {
                window.history.pushState(null, "", window.location.pathname + "?auth=" + i);
            }
        };

        // Emergency Panic Key: Press "Escape" to instantly change the website to Google Classroom
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.location.replace('https://google.com');
            }
        });
    </script>
</body>
</html>
