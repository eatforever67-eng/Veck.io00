<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tab Mask Config (Changeable in options) -->
    <title id="tab-title">Classes</title>
    <link id="tab-icon" rel="icon" type="image/png" href="https://gstatic.com">

    <style>
        /* MonkeyGG Dark Grid Aesthetic */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: #0f0f12; color: #ffffff;
            display: flex; flex-direction: column;
        }

        /* Stealth Top Bar */
        .top-navbar {
            background-color: #16161c; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #23232f;
        }
        .nav-home-btn { 
            font-weight: 700; color: #8b5cf6; font-size: 20px; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .config-btn {
            background: #20202b; border: 1px solid #333; color: white;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .config-btn:hover { border-color: #8b5cf6; }

        /* Game Matrix Grid Layout (Fixes the half-screen bug) */
        .grid-container {
            flex: 1; padding: 40px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px; justify-content: center; align-content: start;
        }
        
        /* MonkeyGG Style Game Tiles */
        .monkey-card {
            background-color: #16161c; border: 1px solid #23232f; border-radius: 12px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column; min-height: 180px;
        }
        .monkey-card:hover { 
            transform: scale(1.05); border-color: #8b5cf6; 
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2);
        }
        .card-image { width: 100%; height: 130px; object-fit: cover; background: #20202b; border-bottom: 1px solid #23232f; }
        .card-name { padding: 12px; font-weight: 600; text-align: center; font-size: 14px; color: #e2e8f0; }

        /* Settings Overlay Widget */
        .settings-panel {
            display: none; position: fixed; top: 75px; right: 30px;
            background: #16161c; border: 2px solid #23232f; border-radius: 10px;
            padding: 20px; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); z-index: 1000;
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .setting-group input, .setting-group select {
            width: 100%; background: #20202b; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <span class="nav-home-btn">🐵 MONKEY.GG ARCADE</span>
        <button class="config-btn" onclick="toggleSettings()">⚙️ Custom Settings</button>
    </div>

    <!-- Core Grid View Context Panel -->
    <div class="grid-container">
        
        <!-- CARD 1: WORKING VECK.IO HUB -->
        <div class="monkey-card" onclick="openAboutBlank('https://veck.io')">
            <img class="card-image" src="https://unsplash.com" alt="Veck">
            <div class="card-name">Veck.io (FPS Multiplayer)</div>
        </div>

        <!-- CARD 2: UNBLOCKED ROBLOX PROXY SERVER -->
        <div class="monkey-card" onclick="openAboutBlank('https://nowgg.me')">
            <img class="card-image" src="https://unsplash.com" alt="Roblox">
            <div class="card-name">Roblox (Now.gg Mirror)</div>
        </div>

        <!-- CARD 3: UNBLOCKED CRAZYGAMES FRAME STREAM -->
        <div class="monkey-card" onclick="openAboutBlank('https://crazygames.com')">
            <img class="card-image" src="https://unsplash.com" alt="CrazyGames">
            <div class="card-name">CrazyGames (Slope Proxy)</div>
        </div>

    </div>

    <!-- Options Overlay Dropdown Form Menu -->
    <div class="settings-panel" id="opt-menu">
        <div class="setting-group">
            <label>Tab Mask Icon & Layout</label>
            <select onchange="applyMaskPreset(this.value)">
                <option value="classroom">Google Classroom</option>
                <option value="drive">Google Drive</option>
                <option value="docs">Google Docs</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Custom Top Icon Image URL</label>
            <input type="text" id="icon-url-field" value="https://gstatic.com" oninput="changeFavicon(this.value)">
        </div>
        <div class="setting-group">
            <label>Emergency Panic Binding Key</label>
            <input type="text" id="panic-key-field" value="Escape" oninput="updatePanicKey(this.value)">
        </div>
        <div class="setting-group">
            <label>Panic Redirect Address</label>
            <input type="text" id="panic-url-field" value="https://classroom.google.com" oninput="updatePanicUrl(this.value)">
        </div>
        <button class="config-btn" style="width:100%; background:#8b5cf6;" onclick="toggleSettings()">Save Variables</button>
    </div>

    <script>
        let runtimeSettings = { key: 'Escape', route: 'https://classroom.google.com' };

        // 1. THE ULTIMATE ABOUT:BLANK CLOAKING ENGINE
        function openAboutBlank(targetUrl) {
            // Spawns an completely raw blank window context tab
            const blankWindow = window.open('about:blank', '_blank');
            if (!blankWindow) {
                alert("Popup blocked! Please allow popups for this site to cloak your games.");
                return;
            }

            // Injects a stylized fullscreen canvas frame straight inside the blank window head
            const doc = blankWindow.document;
            doc.title = document.getElementById('tab-title').innerText;
            
            // Copies the custom icon onto the blank tab head
            const newIcon = doc.createElement('link');
            newIcon.rel = 'icon';
            newIcon.type = 'image/png';
            newIcon.href = document.getElementById('tab-icon').href;
            doc.head.appendChild(newIcon);

            // Resets inner body frame styling constraints
            doc.body.style.margin = '0';
            doc.body.style.padding = '0';
            doc.body.style.height = '100vh';
            doc.body.style.overflow = 'hidden';
            doc.body.style.backgroundColor = '#000';

            // Spawns the sandbox iframe layer inside the untracked tab
            const gameIframe = doc.createElement('iframe');
            gameIframe.src = targetUrl;
            gameIframe.style.width = '100%';
            gameIframe.style.height = '100%';
            gameIframe.style.border = 'none';
            gameIframe.setAttribute('allow', 'pointer-lock; fullscreen;');
            
            doc.body.appendChild(gameIframe);

            // Injects the Panic Button engine script directly inside the blank tab frame environment
            const scriptBlock = doc.createElement('script');
            scriptBlock.innerHTML = `
                window.addEventListener('keydown', function(e) {
                    if (e.key === "${runtimeSettings.key}") {
                        window.location.replace("${runtimeSettings.route}");
                    }
                });
            `;
            doc.body.appendChild(scriptBlock);
        }

        // Toggle Widget Interface Panels
        function toggleSettings() {
            let panel = document.getElementById('opt-menu');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function changeFavicon(url) { document.getElementById('tab-icon').href = url; }
        function updatePanicKey(val) { runtimeSettings.key = val; }
        function updatePanicUrl(val) { runtimeSettings.route = val; }

        function applyMaskPreset(type) {
            let icon = document.getElementById('tab-icon');
            let title = document.getElementById('tab-title');
            let field = document.getElementById('icon-url-field');
            if(type === 'classroom') {
                title.innerText = "Classes"; icon.href = "https://gstatic.com";
            } else if(type === 'drive') {
                title.innerText = "My Drive - Google Drive"; icon.href = "https://gstatic.com";
            } else if(type === 'docs') {
                title.innerText = "Google Docs"; icon.href = "https://gstatic.com";
            }
            field.value = icon.href;
        }

        // Base Dashboard Keyboard Listener Interceptor
        window.addEventListener('keydown', function(e) {
            if (e.key === runtimeSettings.key) { window.location.replace(runtimeSettings.route); }
        });
    </script>
</body>
</html>
