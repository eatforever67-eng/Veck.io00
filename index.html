<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tab Cloaking Elements -->
    <title id="tab-title">Classes</title>
    <link id="tab-icon" rel="icon" type="image/png" href="https://gstatic.com">

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif; background-color: #121212; color: white;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Top Stealth Bar */
        .top-bar {
            background-color: #1e1e1e; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #2d2d2d; z-index: 100;
        }
        .brand { font-weight: bold; color: #4CAF50; cursor: pointer; }
        .controls { display: flex; gap: 10px; }
        .control-btn {
            background-color: #2a2a2a; color: white; border: 1px solid #444;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .control-btn:hover { background-color: #333; border-color: #4CAF50; }

        /* Core Layout States */
        .view-section { display: none; flex: 1; width: 100%; height: 100%; overflow: auto; }
        .view-section.active { display: flex; }

        /* The Game Grid Section */
        #grid-view {
            padding: 30px; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px; align-content: start;
        }
        
        /* Game Selection Cards */
        .game-card {
            background-color: #1e1e1e; border: 2px solid #2d2d2d; border-radius: 8px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column;
        }
        .game-card:hover { transform: translateY(-5px); border-color: #4CAF50; }
        .game-thumb { width: 100%; height: 130px; background-color: #2b2b2b; object-fit: cover; }
        .game-title { padding: 12px; font-weight: 600; text-align: center; font-size: 14px; }

        /* Frame Viewport Section */
        #frame-view { background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Custom Options Window Modals */
        .settings-panel {
            display: none; position: absolute; top: 60px; right: 20px;
            background: #1e1e1e; border: 2px solid #333; border-radius: 8px;
            padding: 20px; width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 200;
        }
        .setting-item { margin-bottom: 12px; }
        .setting-item label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .setting-item input, .setting-item select {
            width: 100%; background: #2b2b2b; border: 1px solid #444; color: white; padding: 6px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Header Navigation System -->
    <div class="top-bar">
        <span class="brand" onclick="showGridView()">🏠 Dashboard</span>
        <div class="controls">
            <button class="control-btn" onclick="toggleSettingsMenu()">⚙️ Settings</button>
        </div>
    </div>

    <!-- MAIN VIEW 1: Visual Game Grid Panel -->
    <div id="grid-view" class="view-section active">
        
        <!-- CARD 1: WORKING VECK.IO -->
        <div class="game-card" onclick="launchGame('https://veck.io')">
            <!-- Replace image src URL with any custom image thumbnail link you want -->
            <img class="game-thumb" src="https://unsplash.com" alt="Veck">
            <div class="game-title">Veck.io</div>
        </div>

        <!-- CARD 2: MINECRAFT SLOT -->
        <div class="game-card" onclick="launchGame('precision-client/index.html')">
            <img class="game-thumb" src="https://unsplash.com" alt="MC">
            <div class="game-title">Precision Client</div>
        </div>

        <!-- CARD 3: RETRO ARCADE SLOT -->
        <div class="game-card" onclick="launchGame('slope/index.html')">
            <img class="game-thumb" src="https://unsplash.com" alt="Slope">
            <div class="game-title">Slope Unblocked</div>
        </div>

    </div>

    <!-- MAIN VIEW 2: Dedicated Fullscreen Game Player -->
    <div id="frame-view" class="view-section">
        <iframe id="active-frame" src="" allow="pointer-lock; fullscreen;"></iframe>
    </div>

    <!-- MODULAR SYSTEM PANEL OVERLAY -->
    <div class="settings-panel" id="settings-menu">
        <div class="setting-item">
            <label>Tab Layout Mask</label>
            <select onchange="applyTabMask(this.value)">
                <option value="classroom">Google Classroom</option>
                <option value="drive">Google Drive</option>
            </select>
        </div>
        <div class="setting-item">
            <label>Custom Title String</label>
            <input type="text" id="title-string" value="Classes" oninput="changeTabTitle(this.value)">
        </div>
        <div class="setting-item">
            <label>Panic Direct Route Key</label>
            <input type="text" id="panic-key" value="Escape" oninput="updatePanicTrigger(this.value)">
        </div>
        <div class="setting-item">
            <label>Panic Target Link</label>
            <input type="text" id="panic-url" value="https://classroom.google.com" oninput="updatePanicRoute(this.value)">
        </div>
        <button class="control-btn" style="width:100%; background:#4CAF50;" onclick="toggleSettingsMenu()">Save Configurations</button>
    </div>

    <script>
        let config = { key: 'Escape', target: 'https://classroom.google.com' };

        function showGridView() {
            document.getElementById('frame-view').classList.remove('active');
            document.getElementById('grid-view').classList.add('active');
            document.getElementById('active-frame').src = ""; // Reset frame to save browser memory
        }

        function launchGame(url) {
            document.getElementById('grid-view').classList.remove('active');
            document.getElementById('frame-view').classList.add('active');
            document.getElementById('active-frame').src = url;
        }

        function toggleSettingsMenu() {
            let menu = document.getElementById('settings-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function changeTabTitle(val) { document.getElementById('tab-title').innerText = val; }
        function updatePanicTrigger(val) { config.key = val; }
        function updatePanicRoute(val) { config.target = val; }

        function applyTabMask(preset) {
            let icon = document.getElementById('tab-icon');
            let inp = document.getElementById('title-string');
            if (preset === 'classroom') {
                inp.value = "Classes";
                icon.href = "https://gstatic.com";
            } else if (preset === 'drive') {
                inp.value = "My Drive - Google Drive";
                icon.href = "https://gstatic.com";
            }
            changeTabTitle(inp.value);
        }

        // Catch Panic Event Trigger Actions
        window.addEventListener('keydown', function(e) {
            if (e.key === config.key) {
                window.location.replace(config.target);
            }
        });
    </script>
</body>
</html>
