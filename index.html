<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drive - Google Docs</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 10%; }
        .btn { background: #34a853; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #2d8e47; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div style="background:#1e1e1e; padding:30px; border-radius:8px; display:inline-block;">
        <h2>Document Viewer Terminal</h2>
        <input type="text" id="tabTitle" placeholder="Tab Title (e.g. Google)"><br>
        <input type="text" id="tabIcon" placeholder="Favicon URL"><br><br>
        <!-- The button must directly execute the window open to stop browser blocking -->
        <button class="btn" onclick="executeStealthLaunch()">Launch Safe Stream</button>
    </div>

    <script src="cloaking.js"></script>
</body>
</html>
